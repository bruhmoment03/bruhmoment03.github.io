<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolKit Pro - Watermark Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>T</text></svg>">
</head>
<body class="tool-page">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo">
                <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="var(--accent)"/>
                    <path d="M8 12h16M8 16h12M8 20h14" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="logo-text">ToolKit<span class="logo-accent">Pro</span></span>
            </a>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <span class="nav-label" data-i18n="nav.tools">Tools</span>
                <a href="index.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 22V12h6v10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="nav.home">Home</span>
                </a>
                <a href="watermark.html" class="nav-item active" data-tool="watermark">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="nav.watermark">Watermark</span>
                </a>
                <a href="#" class="nav-item disabled" data-tool="compress">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="nav.compress">Compress</span>
                    <span class="badge" data-i18n="nav.soon">Soon</span>
                </a>
                <a href="#" class="nav-item disabled" data-tool="convert">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 17l6-6-6-6M12 19h8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="nav.convert">Convert</span>
                    <span class="badge" data-i18n="nav.soon">Soon</span>
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="lang-switcher sidebar-lang">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh-TW">中文</button>
            </div>
            <button class="theme-toggle" aria-label="Toggle dark mode">
                <div class="theme-toggle-track">
                    <div class="theme-toggle-thumb">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                        </svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                        </svg>
                    </div>
                </div>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu" id="mobileMenu" aria-label="Open menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M3 7h18M3 12h18M3 17h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <div class="breadcrumb">
                    <span class="breadcrumb-muted" data-i18n="wm.breadcrumb.tools">Tools</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span class="breadcrumb-current" data-i18n="wm.breadcrumb.watermark">Watermark</span>
                </div>
            </div>
            <div class="topbar-right">
                <span class="version-badge">v1.0</span>
            </div>
        </header>

        <!-- Tool Content -->
        <div class="tool-content">
            <div class="tool-layout">
                <!-- Controls Panel -->
                <section class="controls-panel">
                    <div class="panel-card">
                        <h2 class="panel-title" data-i18n="wm.upload.title">Upload</h2>
                        <div class="upload-zone" id="uploadZone">
                            <input type="file" id="fileInput" accept="image/*" hidden>
                            <svg class="upload-icon" viewBox="0 0 48 48" fill="none">
                                <rect x="4" y="4" width="40" height="40" rx="8" stroke="var(--border)" stroke-width="2" stroke-dasharray="4 4"/>
                                <path d="M24 16v16M16 24h16" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <p class="upload-text"><span data-i18n="wm.upload.text">Drop your file here or</span> <span class="upload-link" data-i18n="wm.upload.browse">browse</span></p>
                            <p class="upload-hint" data-i18n="wm.upload.hint">Supports JPG, PNG, WEBP images</p>
                        </div>
                        <div class="file-info" id="fileInfo" style="display:none">
                            <div class="file-info-content">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                    <rect x="3" y="1" width="14" height="18" rx="2" stroke="var(--accent)" stroke-width="1.5"/>
                                    <path d="M7 7h6M7 10h6M7 13h4" stroke="var(--text-muted)" stroke-width="1.2" stroke-linecap="round"/>
                                </svg>
                                <span class="file-name" id="fileName"></span>
                            </div>
                            <button class="file-remove" id="fileRemove" aria-label="Remove file">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                    <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="panel-card">
                        <h2 class="panel-title" data-i18n="wm.settings.title">Watermark Settings</h2>

                        <div class="control-group">
                            <label class="control-label" for="wmText" data-i18n="wm.settings.text">Text</label>
                            <input type="text" id="wmText" class="control-input" value="CONFIDENTIAL" data-i18n-placeholder="wm.settings.text.placeholder" placeholder="Enter watermark text">
                        </div>

                        <div class="control-row">
                            <div class="control-group">
                                <label class="control-label" for="wmSize" data-i18n="wm.settings.size">Font Size</label>
                                <div class="range-wrapper">
                                    <input type="range" id="wmSize" class="control-range" min="10" max="120" value="48">
                                    <span class="range-value" id="wmSizeValue">48px</span>
                                </div>
                            </div>
                        </div>

                        <div class="control-row">
                            <div class="control-group">
                                <label class="control-label" for="wmPadding" data-i18n="wm.settings.spacing">Spacing</label>
                                <div class="range-wrapper">
                                    <input type="range" id="wmPadding" class="control-range" min="20" max="400" value="150">
                                    <span class="range-value" id="wmPaddingValue">150px</span>
                                </div>
                            </div>
                        </div>

                        <div class="control-row">
                            <div class="control-group">
                                <label class="control-label" for="wmOpacity" data-i18n="wm.settings.opacity">Opacity</label>
                                <div class="range-wrapper">
                                    <input type="range" id="wmOpacity" class="control-range" min="1" max="100" value="15">
                                    <span class="range-value" id="wmOpacityValue">15%</span>
                                </div>
                            </div>
                        </div>

                        <div class="control-row">
                            <div class="control-group">
                                <label class="control-label" for="wmRotation" data-i18n="wm.settings.rotation">Rotation</label>
                                <div class="range-wrapper">
                                    <input type="range" id="wmRotation" class="control-range" min="-90" max="90" value="-30">
                                    <span class="range-value" id="wmRotationValue">-30&#176;</span>
                                </div>
                            </div>
                        </div>

                        <div class="control-group">
                            <label class="control-label" for="wmColor" data-i18n="wm.settings.color">Color</label>
                            <div class="color-picker-row">
                                <input type="color" id="wmColor" class="control-color" value="#000000">
                                <span class="color-hex" id="wmColorHex">#000000</span>
                            </div>
                        </div>

                        <div class="control-group">
                            <label class="control-label" data-i18n="wm.settings.weight">Font Weight</label>
                            <div class="toggle-group">
                                <button class="toggle-btn active" data-weight="normal" data-i18n="wm.settings.weight.regular">Regular</button>
                                <button class="toggle-btn" data-weight="bold" data-i18n="wm.settings.weight.bold">Bold</button>
                            </div>
                        </div>
                    </div>

                    <div class="panel-card">
                        <h2 class="panel-title" data-i18n="wm.presets.title">Presets</h2>
                        <div class="presets-grid">
                            <button class="preset-btn" data-text="CONFIDENTIAL" data-opacity="15" data-size="48">Confidential</button>
                            <button class="preset-btn" data-text="DRAFT" data-opacity="20" data-size="60">Draft</button>
                            <button class="preset-btn" data-text="COPY" data-opacity="12" data-size="40">Copy</button>
                            <button class="preset-btn" data-text="SAMPLE" data-opacity="18" data-size="50">Sample</button>
                            <button class="preset-btn" data-text="DO NOT COPY" data-opacity="15" data-size="36">Do Not Copy</button>
                            <button class="preset-btn" data-text="ORIGINAL" data-opacity="10" data-size="44">Original</button>
                        </div>
                    </div>

                    <button class="btn-primary" id="downloadBtn" disabled>
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path d="M9 2v10M5 8l4 4 4-4M3 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span data-i18n="wm.download">Download Watermarked Image</span>
                    </button>
                </section>

                <!-- Preview Panel -->
                <section class="preview-panel">
                    <div class="preview-header">
                        <h2 class="panel-title" data-i18n="wm.preview.title">Preview</h2>
                        <div class="preview-actions">
                            <button class="preview-action-btn" id="zoomIn" aria-label="Zoom in">
                                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                    <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/>
                                    <path d="M12.5 12.5L16 16M6 8h4M8 6v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                </svg>
                            </button>
                            <button class="preview-action-btn" id="zoomOut" aria-label="Zoom out">
                                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                    <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/>
                                    <path d="M12.5 12.5L16 16M6 8h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                </svg>
                            </button>
                            <button class="preview-action-btn" id="zoomReset" aria-label="Reset zoom">
                                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                    <path d="M3 3v4h4M15 15v-4h-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M14.5 7A6 6 0 007 3.5L3 7M3.5 11A6 6 0 0011 14.5l4-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="preview-canvas-wrapper" id="previewWrapper">
                        <div class="preview-placeholder" id="previewPlaceholder">
                            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                                <rect x="8" y="8" width="48" height="48" rx="8" stroke="var(--border)" stroke-width="2"/>
                                <circle cx="24" cy="26" r="4" stroke="var(--text-muted)" stroke-width="1.5"/>
                                <path d="M8 42l12-12 8 8 8-8 20 20" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <p data-i18n="wm.preview.placeholder">Upload an image to preview</p>
                        </div>
                        <canvas id="previewCanvas" style="display:none"></canvas>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="i18n.js"></script>
    <script src="shared.js"></script>
    <script src="watermark.js"></script>
</body>
</html>
